[env]
_.path = ["target/debug", "test/bats/bin"]

[tasks.test]
depends = ["build:ui"]
run = [
  "cargo nextest run",
  "git submodule update --init --recursive",
  "mise run test:bats",
]

[tasks."test:bats"]
description = "Run bats e2e tests"
run = '''
if [ -n "$TRANCHE" ] && [ -n "$TRANCHE_COUNT" ]; then
  tests=$(ls -1 test/*.bats | sort | awk -v t="$TRANCHE" -v n="$TRANCHE_COUNT" 'NR % n == t')
else
  tests="test"
fi
if command -v parallel >/dev/null 2>&1; then
  bats --jobs 16 $tests
else
  echo "GNU parallel not found, running sequentially" >&2
  bats $tests
fi
'''

[tasks.build-dev]
description = "rebuild and restart supervisor (without sudo, as what Agent prefers), to make changes take effect"
depends = ["build"]
run = "pitchfork sup start -f"

[tasks.ci]
depends = ["lint", "build", "build:docs", "test", "render"]

[tasks.ci-dev]
depends = ["lint-fix", "build", "build:docs", "test", "render"]

[tasks.docs]
dir = "docs"
run = "aube install && exec aube run docs:dev"

[tasks.lint]
depends = ["build:ui"]
run = "hk check --all"

[tasks.lint-fix]
depends = ["build:ui"]
run = "hk fix --all"

[tasks.build]
depends = ["build:ui"]
run = ["cargo build"]

[tasks."test:web-ui"]
depends = ["build"]
dir = "ui"
run = [
  "aube install",
  "if [ \"$(uname -s)\" = \"Linux\" ]; then node_modules/.bin/playwright install --with-deps chromium; else node_modules/.bin/playwright install chromium; fi",
  "node_modules/.bin/playwright test",
]

[tasks."build:ui"]
dir = "ui"
run = "aube install && exec aube run build && touch ../src/web/static_files.rs"
sources = ["src/**/*"]
outputs = ["dist/**/*"]

[tasks."build:docs"]
dir = "docs"
run = "aube install && exec aube run docs:build"

[tasks.render]
depends = ["build"]
run = [
  "pitchfork usage > pitchfork.usage.kdl",
  "rm -rf docs/cli && mkdir -p docs/cli",
  "usage g markdown -mf pitchfork.usage.kdl --out-dir docs/cli --url-prefix /cli",
  "usage g json -f pitchfork.usage.kdl > docs/cli/commands.json",
  "pitchfork schema > docs/public/schema.json",
  "pitchfork api-schema > docs/public/api-schema.json",
  "git add pitchfork.usage.kdl docs",
]

[tasks.install-dev]
depends = ["build:ui"]
env = { "PITCHFORK_LOG" = "debug" }
run = [
  "cargo install --path . --debug",
  "pitchfork sup start -f",
]

[tools]
aube = "latest"
cargo-binstall = "latest"
communique = "latest"
hk = "latest"
node = "24"
pkl = "latest"
usage = "latest" # for rendering CLI usage
"cargo:cargo-nextest" = "latest"
rust = "stable"
