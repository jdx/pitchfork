[env]
_.path = "target/debug"

[tasks.test]
run = [
  "cargo nextest run",
  "git submodule update --init --recursive",
  "test/bats/bin/bats test",
]

[tasks.build-dev]
description = "rebuild and restart supervisor (without sudo, as what Agent prefers), to make changes take effect"
depends = ["build"]
run = "pitchfork sup start -f"

[tasks.ci]
depends = ["lint", "build", "build:docs", "test"]

[tasks.ci-dev]
depends = ["lint-fix", "build", "build:docs", "test"]

[tasks.docs]
dir = "docs"
run = "aube install && exec aube run docs:dev"

[tasks.lint]
run = "hk check --all"

[tasks.lint-fix]
run = "hk fix --all"

[tasks.build]
depends = ["build:ui"]
run = ["cargo build"]

[tasks."build:ui"]
dir = "ui"
run = "aube install && exec aube run build && touch src/web/static_files.rs"
sources = ["src/**/*"]
outputs = ["dist/**/*"]

[tasks."build:docs"]
dir = "docs"
run = "aube install && exec aube run docs:build"

[tasks.render]
depends = ["build"]
run = [
  "pitchfork usage > pitchfork.usage.kdl",
  "rm -rf docs/cli && mkdir -p docs/cli",
  "usage g markdown -mf pitchfork.usage.kdl --out-dir docs/cli --url-prefix /cli",
  "usage g json -f pitchfork.usage.kdl > docs/cli/commands.json",
  "pitchfork schema > docs/public/schema.json",
  "pitchfork api-schema > docs/public/api-schema.json",
  "git add pitchfork.usage.kdl docs",
]

[tasks.install-dev]
env = { "PITCHFORK_LOG" = "debug" }
run = [
  "cargo install --path . --debug",
  "pitchfork sup start -f",
]

[tools]
aube = "latest"
bun = "latest" # for tests. FIXME: replace with aube + node
cargo-binstall = "latest"
communique = "latest"
hk = "latest"
node = "24"
pkl = "latest"
usage = "latest" # for rendering CLI usage
"cargo:cargo-nextest" = "latest"
rust = "stable"
