# Cross configuration for pitchfork
# Uses cross-rs 0.2.5 images (Ubuntu 16.04, glibc 2.23) for maximum compatibility

[build.env]
passthrough = [
  "RUST_BACKTRACE",
  "CARGO_TERM_COLOR",
]

[target.x86_64-unknown-linux-gnu]
image = "ghcr.io/cross-rs/x86_64-unknown-linux-gnu:0.2.5"

[target.aarch64-unknown-linux-gnu]
# Use newer image for aarch64 to get assembler that supports ARMv8.2-A crypto instructions
image = "ghcr.io/cross-rs/aarch64-unknown-linux-gnu:main"
