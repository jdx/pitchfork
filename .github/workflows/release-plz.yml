name: Release-plz

permissions: {}

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to finish releasing (e.g. v2.7.0). Skips release-plz, runs upload-assets + enhance-release."
        required: true
        type: string

jobs:
  release-plz-release:
    name: Release
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' && github.repository_owner == 'jdx' }}
    permissions:
      contents: write
      pull-requests: write
    outputs:
      tag: ${{ steps.release-plz.outputs.releases && fromJSON(steps.release-plz.outputs.releases)[0].tag || '' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Run release-plz
        id: release-plz
        uses: release-plz/action@064f4d1e36c843611ddf013be726beaa4ad804db # v0.5.129
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  upload-assets:
    name: Upload assets
    needs: release-plz-release
    if: >-
      ${{ always() && (inputs.tag != '' || needs.release-plz-release.outputs.tag != '') }}
    permissions:
      contents: write
    uses: ./.github/workflows/release.yml
    with:
      tag: ${{ inputs.tag != '' && inputs.tag || needs.release-plz-release.outputs.tag }}
    secrets:
      CERTIFICATES_P12: ${{ secrets.CERTIFICATES_P12 }}
      CERTIFICATES_P12_PASS: ${{ secrets.CERTIFICATES_P12_PASS }}

  enhance-release:
    name: Enhance release notes
    needs: [release-plz-release, upload-assets]
    if: >-
      ${{ always() && needs.upload-assets.result == 'success' && (inputs.tag != '' || needs.release-plz-release.outputs.tag != '') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      TAG: ${{ inputs.tag != '' && inputs.tag || needs.release-plz-release.outputs.tag }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
      - run: communique generate "$TAG" --github-release
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      - name: Append sponsor blurb
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
        run: |
          body=$(gh release view "$TAG" --json body --jq .body)
          if grep -qiE '^##.*Sponsor pitchfork' <<<"$body"; then
            echo "Sponsor section already present in $TAG release notes; skipping append."
            exit 0
          fi
          {
            printf '%s\n' "$body"
            cat <<'EOF'

          ## 💚 Sponsor pitchfork

          pitchfork is built by [@jdx](https://github.com/jdx), who ships developer tools like [mise](https://mise.jdx.dev/), hk, pitchfork, and more. Development is sustained by sponsorships.

          If pitchfork has a place in your dev workflow, please consider [sponsoring on GitHub](https://github.com/sponsors/jdx). Individual and company sponsorships are what keep the project healthy and moving forward.
          EOF
          } > /tmp/release-notes.md
          gh release edit "$TAG" --notes-file /tmp/release-notes.md

  release-plz-pr:
    name: Release PR
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' && github.repository_owner == 'jdx' }}
    permissions:
      contents: write
      pull-requests: write
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      # release-plz-pr needs persisted credentials so the later
      # `git fetch` / `git push --force-with-lease` can authenticate.
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # zizmor: ignore[artipacked] v6
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PLZ_TOKEN }}
      - name: Run release-plz
        id: release-plz
        uses: release-plz/action@064f4d1e36c843611ddf013be726beaa4ad804db # v0.5.129
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
      - name: Install mise
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
      - name: Squash generated docs into release PR
        run: |
          PR_BRANCH=$(echo "${STEPS_RELEASE_PLZ_OUTPUTS_PR}" | jq -r '.head_branch // empty')
          if [ -z "$PR_BRANCH" ]; then
            PR_BRANCH=$(gh pr list --state open --base main --json headRefName,updatedAt --jq 'sort_by(.updatedAt) | reverse | map(select(.headRefName | startswith("release-plz-")))[0].headRefName // empty' 2>/dev/null || true)
          fi
          if [ -z "$PR_BRANCH" ]; then
            echo "No release PR branch found, skipping"
            exit 0
          fi
          echo "Updating release PR on branch: $PR_BRANCH"
          git fetch origin "$PR_BRANCH"
          git checkout "$PR_BRANCH"
          mise run render ::: lint-fix
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit --amend --no-edit
            git push --force-with-lease origin "$PR_BRANCH"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
          STEPS_RELEASE_PLZ_OUTPUTS_PR: ${{ steps.release-plz.outputs.pr }}
