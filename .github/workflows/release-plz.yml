name: Release-plz

permissions: {}

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to finish releasing (e.g. v2.7.0). Skips release-plz, runs upload-assets + enhance-release."
        required: true
        type: string

jobs:
  pending-release:
    if: ${{ github.event_name == 'push' && github.repository_owner == 'jdx' }}
    runs-on: ubuntu-latest
    outputs:
      has_release_commits: ${{ steps.commits.outputs.has_release_commits }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Check for fix/feat commits since the latest release
        id: commits
        run: |
          set -euo pipefail

          latest_tag=$(git tag --list 'v[0-9]*' --sort=-v:refname | head -1 || true)
          if [ -n "$latest_tag" ]; then
            range="${latest_tag}..HEAD"
            echo "Checking pending commits since ${latest_tag}"
          else
            range="HEAD"
            echo "No v* release tag found; checking all commits"
          fi

          if git log --format=%s "$range" | grep -Eq '^(fix|feat)(\([^)]+\))?!?: '; then
            echo "has_release_commits=true" >> "$GITHUB_OUTPUT"
          else
            echo "No pending fix/feat commits; skipping autorelease."
            echo "has_release_commits=false" >> "$GITHUB_OUTPUT"
          fi

  release-plz-release:
    name: Release
    needs: pending-release
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' && github.repository_owner == 'jdx' && needs.pending-release.outputs.has_release_commits == 'true' }}
    permissions:
      contents: write
      pull-requests: write
    outputs:
      tag: ${{ steps.release-plz.outputs.releases && fromJSON(steps.release-plz.outputs.releases)[0].tag || '' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Install mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
      - name: Build UI assets
        working-directory: ui
        run: |
          aube install
          aube run build
      - name: Run release-plz
        id: release-plz
        uses: release-plz/action@e8792575c7f2366cf6ff3ccc33ead9ace5b691c7 # v0.5.130
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  upload-assets:
    name: Upload assets
    needs: release-plz-release
    if: >-
      ${{ always() && (inputs.tag != '' || needs.release-plz-release.outputs.tag != '') }}
    permissions:
      contents: write
    uses: ./.github/workflows/release.yml
    with:
      tag: ${{ inputs.tag != '' && inputs.tag || needs.release-plz-release.outputs.tag }}
    secrets:
      CERTIFICATES_P12: ${{ secrets.CERTIFICATES_P12 }}
      CERTIFICATES_P12_PASS: ${{ secrets.CERTIFICATES_P12_PASS }}

  enhance-release:
    name: Enhance release notes
    needs: [release-plz-release, upload-assets]
    if: >-
      ${{ always() && needs.upload-assets.result == 'success' && (inputs.tag != '' || needs.release-plz-release.outputs.tag != '') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      TAG: ${{ inputs.tag != '' && inputs.tag || needs.release-plz-release.outputs.tag }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
      - run: communique generate "$TAG" --github-release
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      - name: Append sponsor blurb
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
        run: |
          body=$(gh release view "$TAG" --json body --jq .body)
          if grep -qiE '^##.*Sponsor pitchfork' <<<"$body"; then
            echo "Sponsor section already present in $TAG release notes; skipping append."
            exit 0
          fi
          {
            printf '%s\n' "$body"
            cat <<'EOF'

          ## 💚 Sponsor pitchfork

          pitchfork is maintained by [@jdx](https://github.com/jdx), an open source developer for [**entire.io**](https://entire.io), the title sponsor of the [jdx.dev](https://jdx.dev) open source tools including [mise](https://mise.jdx.dev/), [aube](https://aube.jdx.dev/), hk, and more. Development is sustained by sponsorships.

          If pitchfork has a place in your dev workflow, please consider [sponsoring at jdx.dev](https://jdx.dev/sponsors.html). Individual and company sponsorships are what keep the project healthy and moving forward.
          EOF
          } > /tmp/release-notes.md
          gh release edit "$TAG" --notes-file /tmp/release-notes.md

  release-plz-pr:
    name: Release PR
    needs: pending-release
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' && github.repository_owner == 'jdx' && needs.pending-release.outputs.has_release_commits == 'true' }}
    permissions:
      contents: write
      pull-requests: write
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      # release-plz-pr needs persisted credentials so the later
      # `git fetch` / `git push --force-with-lease` can authenticate.
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # zizmor: ignore[artipacked] v6
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PLZ_TOKEN }}
      - name: Install mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
      - name: Build UI assets
        working-directory: ui
        run: |
          aube install
          aube run build
      - name: Run release-plz
        id: release-plz
        uses: release-plz/action@e8792575c7f2366cf6ff3ccc33ead9ace5b691c7 # v0.5.130
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
      - name: Squash generated docs into release PR
        run: |
          PR_BRANCH=$(echo "${STEPS_RELEASE_PLZ_OUTPUTS_PR}" | jq -r '.head_branch // empty')
          if [ -z "$PR_BRANCH" ]; then
            PR_BRANCH=$(gh pr list --state open --base main --json headRefName,updatedAt --jq 'sort_by(.updatedAt) | reverse | map(select(.headRefName | startswith("release-plz-")))[0].headRefName // empty' 2>/dev/null || true)
          fi
          if [ -z "$PR_BRANCH" ]; then
            echo "No release PR branch found, skipping"
            exit 0
          fi
          echo "Updating release PR on branch: $PR_BRANCH"
          git fetch origin "$PR_BRANCH"
          git checkout "$PR_BRANCH"
          mise run render ::: lint-fix
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit --amend --no-edit
            git push --force-with-lease origin "$PR_BRANCH"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
          STEPS_RELEASE_PLZ_OUTPUTS_PR: ${{ steps.release-plz.outputs.pr }}
