name: windows-ci

on:
  workflow_dispatch:

permissions: {}

env:
  CARGO_TERM_COLOR: always
  MISE_EXPERIMENTAL: true

jobs:
  rust-tests:
    runs-on: windows-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: true
          persist-credentials: false
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          cache: false
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Build UI assets
        working-directory: ui
        run: |
          aube install
          aube run build
      - name: Run Rust tests
        run: cargo nextest run --all-features

  bats-tests:
    runs-on: windows-latest
    timeout-minutes: 30
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        tranche: [0, 1]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: true
          persist-credentials: false
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          cache: false
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Install sqlite3
        shell: pwsh
        run: choco install sqlite -y --no-progress
      - name: Build UI assets
        working-directory: ui
        run: |
          aube install
          aube run build
      - name: Build
        run: cargo build --all-features
      - name: Run bats e2e tests (tranche ${{ matrix.tranche }})
        shell: bash
        env:
          TRANCHE: ${{ matrix.tranche }}
          TRANCHE_COUNT: 2
        run: |
          export PATH="$PWD/target/debug:$PATH"
          tests=$(ls -1 test/*.bats | sort | awk -v t="$TRANCHE" -v n="$TRANCHE_COUNT" 'NR % n == t')
          echo "Running tranche $TRANCHE: $tests"
          test/bats/bin/bats $tests
        continue-on-error: true
