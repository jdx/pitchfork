#:schema https://pitchfork.en.dev/schema.json

[daemons.docs]
run = "mise run -q docs"
ready_output = "http://localhost:"
port = { expect = [5173], bump = 10 }
pty = true

[settings.proxy]
enable = true
# Use a non-privileged port (7777) so agents don't need sudo.
# If you need HTTPS on port 443, set https = true and run with sufficient privileges.
https = false